<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 Pagamentos do Casamento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#f5f5f5;
  margin:0;
}
.container{
  max-width:520px;
  margin:auto;
  padding:20px;
}
h1{
  text-align:center;
}
.frase{
  text-align:center;
  color:#666;
  margin-bottom:20px;
}
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  background:white;
  padding:10px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.tab-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#f0f0f0;
  color:#333;
  font-weight:bold;
  cursor:pointer;
  transition: all 0.3s ease;
}
.tab-btn.ativo{
  background:#ff4d6d;
  color:white;
}
.tab-btn:hover{
  background:#e63d63;
  color:white;
}
.tab-content{
  display:none;
}
.tab-content.ativo{
  display:block;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  margin-bottom:20px;
}
input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}
button{
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff4d6d;
  color:white;
  font-weight:bold;
  width:100%;
  cursor:pointer;
  transition: all 0.3s ease;
}
button:hover{
  background:#e63d63;
}
button:disabled{
  background:#ccc;
  cursor:not-allowed;
  opacity:0.6;
}
.item{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
  transition: all 0.3s ease;
}
.item.pago{
  background:#e8f7ee;
  border-left:5px solid #4CAF50;
}
.topItem{
  display:flex;
  justify-content:space-between;
}
.progresso{
  height:8px;
  background:#ddd;
  border-radius:5px;
  margin-top:8px;
  overflow:hidden;
}
.progressoBar{
  height:8px;
  background:#4CAF50;
  transition: width 0.5s ease;
}
.botoes{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.botoes button{
  flex:1;
  font-size:14px;
  padding:8px;
}
.badge-pago{
  display:inline-block;
  background:#4CAF50;
  color:white;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
  margin-top:8px;
}
.total{
  text-align:center;
  font-size:16px;
  font-weight:bold;
  margin:10px 0;
}
.total-faltando{
  color:#ff4d6d;
}
.grafico-card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  margin-bottom:20px;
}
.grafico-card h3{
  margin:0 0 15px 0;
  font-size:16px;
  color:#333;
  text-align:center;
}
.grafico-card canvas{
  max-width:100%;
}
.tarefa-formulario{
  background:#f9f9f9;
  padding:12px;
  border-radius:8px;
  margin-bottom:15px;
  border-left:4px solid #ff4d6d;
}
.tarefa-formulario input, .tarefa-formulario select{
  margin-bottom:8px;
}
.tarefa-formulario button{
  padding:8px;
  font-size:14px;
}
.tarefa-item{
  display:flex;
  align-items:center;
  padding:12px;
  background:#f9f9f9;
  border-radius:8px;
  margin-bottom:8px;
  transition: all 0.3s ease;
  cursor:pointer;
}
.tarefa-item:hover{
  background:#f0f0f0;
}
.tarefa-item.feita{
  background:#e8f7ee;
  opacity:0.7;
}
.tarefa-item.feita .tarefa-texto{
  text-decoration:line-through;
  color:#999;
}
.tarefa-texto{
  flex:1;
  font-size:14px;
}
.tarefa-responsavel{
  font-size:12px;
  color:#999;
  font-weight:bold;
  margin-left:auto;
  background:#ddd;
  padding:4px 8px;
  border-radius:4px;
}
.tarefa-btn-small{
  width:32px;
  height:32px;
  min-width:32px;
  padding:0;
  margin-right:12px;
  border:none;
  border-radius:6px;
  background:#999;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition: all 0.3s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}
.tarefa-btn-small:hover{
  background:#777;
  transform:scale(1.1);
}
.tarefa-item.feita .tarefa-btn-small{
  background:#4CAF50;
}
.tarefa-item.feita .tarefa-btn-small:hover{
  background:#45a049;
}
.modal{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
.modalContent{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:420px;
  max-height:80vh;
  overflow-y:auto;
}
.pagoItem{
  background:#e8f7ee;
  padding:8px;
  border-radius:6px;
  margin-top:6px;
  font-size:14px;
}
.alerta{
  padding:12px;
  border-radius:8px;
  margin-bottom:15px;
}
.alerta.sucesso{
  background:#d4edda;
  color:#155724;
  border-left:4px solid #28a745;
}
.alerta.erro{
  background:#f8d7da;
  color:#721c24;
  border-left:4px solid #dc3545;
}
.empty-state{
  text-align:center;
  color:#999;
  padding:40px 20px;
}
#uploadFrame{
  display:none;
}
.confirmModal{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}
.confirmContent{
  background:white;
  padding:30px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}
.confirmContent h3{
  margin-top:0;
  color:#333;
}
.confirmContent p{
  color:#666;
  margin-bottom:20px;
}
.confirmBotoes{
  display:flex;
  gap:12px;
  justify-content:center;
}
.confirmBotoes button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.btnConfirmar{
  background:#dc3545;
  color:white;
}
.btnConfirmar:hover{
  background:#c82333;
}
.btnCancelar{
  background:#6c757d;
  color:white;
}
.btnCancelar:hover{
  background:#5a6268;
}
</style>
</head>
<body>

<div class="container">

<h1>💍 Nosso Casamento</h1>

<div class="frase">
"Cada pagamento é um passo para o grande dia ❤️"
</div>

<!-- ABAS -->
<div class="tabs">
  <button class="tab-btn ativo" onclick="abrirAba('pagamentos')">💰 Pagamentos</button>
  <button class="tab-btn" onclick="abrirAba('tarefas')">📋 Tarefas</button>
</div>

<!-- ABA PAGAMENTOS -->
<div id="pagamentos" class="tab-content ativo">

  <div class="card">
    <div id="alerta"></div>
    <input id="descricao" placeholder="Ex: Fotógrafo">
    <input id="valorTotal" type="number" placeholder="Valor total (R$)">
    <button id="btnAdicionar" onclick="addItem()">Adicionar compromisso ✨</button>
  </div>

  <div class="card">
    <div class="total">
      Total planejado: R$ <span id="totalPlanejado">0</span>
    </div>
    <div class="total">
      Total pago: R$ <span id="totalPago">0</span>
    </div>
    <div class="total total-faltando">
      Total faltando: R$ <span id="totalFaltando">0</span>
    </div>
    <div class="progresso">
      <div id="barraGeral" class="progressoBar" style="width:0%"></div>
    </div>
  </div>

  <div class="grafico-card">
    <h3>💰 Orçamento</h3>
    <canvas id="graficoOrcamento"></canvas>
  </div>

  <div id="lista"></div>

</div>

<!-- ABA TAREFAS -->
<div id="tarefas" class="tab-content">

  <div class="tarefa-formulario card">
    <h3 style="margin-top:0; margin-bottom:12px;">➕ Nova Tarefa</h3>
    <input id="novoTarefaTexto" type="text" placeholder="Descrição da tarefa...">
    <select id="novoTarefaResponsavel">
      <option value="Juntos">Juntos</option>
      <option value="Everton">Everton</option>
      <option value="Iara">Iara</option>
    </select>
    <button onclick="adicionarNovaTarefa()">+ Adicionar Tarefa</button>
  </div>

  <div class="grafico-card">
    <h3>📋 Progresso das Tarefas</h3>
    <canvas id="graficoTarefas"></canvas>
  </div>

  <div class="card">
    <div id="tarefasLista"></div>
  </div>

</div>

</div>

<div id="modal" class="modal">
  <div class="modalContent">
    <h3 id="tituloItem"></h3>
    <input id="valorPagamento" type="number" placeholder="Valor pago">
    <button id="btnRegistrar" onclick="registrarPagamento()">Registrar pagamento 🎉</button>
    <h4>Histórico</h4>
    <div id="historico"></div>
    <button onclick="fecharModal()">Fechar</button>
  </div>
</div>

<div id="confirmModal" class="confirmModal">
  <div class="confirmContent">
    <h3>⚠️ Confirmar Exclusão</h3>
    <p>Tem certeza que deseja remover este item?<br>
      Essa ação não pode ser desfeita.</p>
    <div class="confirmBotoes">
      <button class="btnCancelar" onclick="cancelarDelecao()">Cancelar</button>
      <button class="btnConfirmar" onclick="confirmarDelecao()">Deletar</button>
    </div>
  </div>
</div>



<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsrgA3vUSuRiz3r2rl5vPMgKt5gdUi9deqXIxnizBpqeZdhVTnWqBbprOorpXtBTnQRg/exec";

let itens = [];
let pagamentosGlobais = [];
let tarefasGlobais = [];
let itemSelecionado = null;
let itemParaDeletar = null;
let graficoOrcamentoChart = null;
let graficoTarefasChart = null;
let ultimoTotalPago = 0;
let abaAtiva = 'pagamentos';
let estaSalvandoTarefa = false;
let intervaloTarefas = null;
let intervaloItens = null;

// ============================================
// ABAS
// ============================================

function abrirAba(nomeAba) {
  abaAtiva = nomeAba;
  
  // Ocultar todas as abas
  document.getElementById('pagamentos').classList.remove('ativo');
  document.getElementById('tarefas').classList.remove('ativo');
  
  // Remover ativo de todos os botões
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('ativo');
  });
  
  // Ativar aba e botão clicado
  document.getElementById(nomeAba).classList.add('ativo');
  event.target.classList.add('ativo');
  
  // Carregar dados da aba
  if (nomeAba === 'tarefas') {
    carregarTodasAsTarefas();
  } else {
    carregarTudo();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  carregarTodasAsTarefas();
  carregarTudo();
  
  // NÃO sincroniza tarefas automaticamente (evita conflito)
  // Sincronizar itens a cada 2 segundos
  intervaloItens = setInterval(carregarTudo, 2000);
});

// ============================================
// CONFETE
// ============================================

function triggerConfete() {
  confetti({
    particleCount: 100,
    spread: 70,
    origin: { y: 0.6 },
    colors: ['#ff4d6d', '#ffd700', '#ff1493', '#ff69b4', '#ff6347']
  });
}

// ============================================
// GERENCIAR TAREFAS (SINCRONIZADAS)
// ============================================

function carregarTodasAsTarefas() {
  const urlTarefas = SCRIPT_URL + "?acao=getTarefas";
  console.log(">>> [GET] Carregando tarefas de:", urlTarefas);
  
  fetch(urlTarefas)
    .then(r => {
      console.log(">>> [GET] Response status:", r.status);
      return r.json();
    })
    .then(data => {
      console.log(">>> [GET] Resposta completa:", data);
      console.log(">>> [GET] sucesso?", data.sucesso);
      console.log(">>> [GET] quantidade de tarefas:", data.tarefas ? data.tarefas.length : 0);
      
      if (data.sucesso && data.tarefas) {
        console.log(">>> [GET] Atualizando array tarefasGlobais...");
        tarefasGlobais = data.tarefas;
        
        // Mostrar primeiras 3 tarefas carregadas
        for (let i = 0; i < Math.min(3, data.tarefas.length); i++) {
          const t = data.tarefas[i];
          console.log(">>>   Tarefa", i+1, ":", t.texto, "| feita:", t.feita);
        }
        
        console.log(">>> [GET] Renderizando tarefas...");
        renderTarefas();
      } else {
        console.log(">>> [GET] ERRO: Resposta inválida!");
      }
    })
    .catch(error => {
      console.error(">>> [GET] ERRO ao carregar tarefas:", error);
    });
}

function toggleTarefa(tarefaId) {
  const tarefa = tarefasGlobais.find(t => t.id === tarefaId);
  if (!tarefa) {
    console.error(">>> ERRO: Tarefa não encontrada!");
    return;
  }
  
  estaSalvandoTarefa = true;
  const novoValor = !tarefa.feita;
  
  console.log("=".repeat(60));
  console.log(">>> [TOGGLE] INICIANDO");
  console.log(">>> [TOGGLE] Texto:", tarefa.texto);
  console.log(">>> [TOGGLE] Mudando de:", tarefa.feita, "para:", novoValor);
  
  // Mostrar status visual
  mostrarAlerta(`⏳ Salvando: ${tarefa.texto.substring(0, 20)}...`, 'sucesso');
  
  // Criar FormData
  const formData = new FormData();
  formData.append("tipo", "toggleTarefa");
  formData.append("tarefaId", tarefaId);
  formData.append("feita", novoValor.toString());
  
  console.log(">>> [TOGGLE] Enviando fetch POST...");
  
  fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  })
  .then(response => {
    console.log(">>> [TOGGLE] POST Status:", response.status);
    if (!response.ok) {
      throw new Error("HTTP error " + response.status);
    }
    return response.text();
  })
  .then(result => {
    console.log(">>> [TOGGLE] POST respondeu:", result);
    console.log(">>> [TOGGLE] Iniciando polling para verificar salvamento...");
    
    // Agora fazer polling para verificar se realmente salvou
    verificarSalvamentoDaTarefa(tarefaId, novoValor, tarefa.texto, 0);
  })
  .catch(error => {
    console.error(">>> [TOGGLE] ❌ ERRO no POST:", error);
    mostrarAlerta("❌ Erro ao salvar. Tente novamente.", "erro");
    estaSalvandoTarefa = false;
  });
}

function verificarSalvamentoDaTarefa(tarefaId, novoValor, textoTarefa, tentativa) {
  console.log(`>>> [POLLING] Tentativa ${tentativa + 1}/10 para ${textoTarefa}`);
  
  if (tentativa > 10) {
    console.error(">>> [POLLING] ❌ Falhou após 10 tentativas!");
    mostrarAlerta(`❌ Não conseguiu salvar após ${tentativa} tentativas.`, "erro");
    estaSalvandoTarefa = false;
    return;
  }
  
  // Aguardar 500ms antes de verificar
  setTimeout(() => {
    console.log(`>>> [POLLING] Carregando tarefas (tentativa ${tentativa + 1})...`);
    
    const urlTarefas = SCRIPT_URL + "?acao=getTarefas";
    
    fetch(urlTarefas)
      .then(r => r.json())
      .then(data => {
        if (!data.sucesso || !data.tarefas) {
          throw new Error("Resposta inválida");
        }
        
        // Procurar pela tarefa
        const tarefaAtualizada = data.tarefas.find(t => t.id === tarefaId);
        
        if (tarefaAtualizada && tarefaAtualizada.feita === novoValor) {
          // ✅ SUCESSO! Tarefa foi salva com o novo valor!
          console.log(`>>> [POLLING] ✅ SUCESSO! Tarefa foi salva como ${novoValor}!`);
          mostrarAlerta(`✅ Salvo: ${textoTarefa.substring(0, 20)}`, "sucesso");
          
          // Atualizar dados
          tarefasGlobais = data.tarefas;
          renderTarefas();
          estaSalvandoTarefa = false;
        } else {
          // ❌ Ainda não atualizou, tentar novamente
          console.log(`>>> [POLLING] Ainda não atualizou (feita: ${tarefaAtualizada ? tarefaAtualizada.feita : 'NOT FOUND'}). Tentando novamente...`);
          verificarSalvamentoDaTarefa(tarefaId, novoValor, textoTarefa, tentativa + 1);
        }
      })
      .catch(error => {
        console.error(`>>> [POLLING] ❌ Erro na tentativa ${tentativa + 1}:`, error);
        // Tentar novamente
        verificarSalvamentoDaTarefa(tarefaId, novoValor, textoTarefa, tentativa + 1);
      });
  }, 500);
}

function adicionarNovaTarefa() {
  const descricao = document.getElementById("novoTarefaTexto").value.trim();
  const responsavel = document.getElementById("novoTarefaResponsavel").value.trim() || "Juntos";

  if (!descricao) {
    mostrarAlerta('Digite a descrição da tarefa', 'erro');
    return;
  }

  const formData = new FormData();
  formData.append("tipo", "salvarTarefa");
  formData.append("tarefaTexto", descricao);
  formData.append("responsavel", responsavel);

  console.log(">>> [CRIAR] Criando nova tarefa:", descricao);
  
  fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  })
  .then(response => {
    console.log(">>> [CRIAR] Status:", response.status);
    return response.text();
  })
  .then(result => {
    console.log(">>> [CRIAR] Resposta:", result);
    mostrarAlerta('✅ Tarefa criada!', 'sucesso');
    document.getElementById("novoTarefaTexto").value = "";
    document.getElementById("novoTarefaResponsavel").value = "Juntos";

    setTimeout(() => {
      carregarTodasAsTarefas();
    }, 1000);
  })
  .catch(error => {
    console.error(">>> [CRIAR] Erro:", error);
    mostrarAlerta('❌ Erro ao criar tarefa', 'erro');
  });
}

function renderTarefas() {
  const tarefasLista = document.getElementById("tarefasLista");
  tarefasLista.innerHTML = "";
  
  console.log(">>> [RENDER] Renderizando", tarefasGlobais.length, "tarefas");
  
  if (tarefasGlobais.length === 0) {
    console.log(">>> [RENDER] Nenhuma tarefa!");
    tarefasLista.innerHTML = '<p style="color:#999; text-align:center;">Nenhuma tarefa cadastrada</p>';
    return;
  }
  
  tarefasGlobais.forEach((tarefa, idx) => {
    const statusStr = tarefa.feita ? "✓ FEITA" : "○ NÃO FEITA";
    console.log(">>> [RENDER]", idx+1, ":", tarefa.texto.substring(0, 30), "|", statusStr);
    
    const btnSymbol = tarefa.feita ? "✓" : "○";
    
    const tarefaHTML = `
      <div class="tarefa-item ${tarefa.feita ? 'feita' : ''}">
        <button class="tarefa-btn-small" onclick="toggleTarefa('${tarefa.id}')" title="${tarefa.feita ? 'Desmarcar' : 'Marcar'}">
          ${btnSymbol}
        </button>
        <div class="tarefa-texto">${tarefa.texto}</div>
        <div class="tarefa-responsavel">${tarefa.responsavel}</div>
      </div>
    `;
    tarefasLista.innerHTML += tarefaHTML;
  });
  
  console.log(">>> [RENDER] Renderização concluída!");
  
  // Atualizar gráfico de tarefas
  atualizarGraficoTarefas();
}

// ============================================
// GRÁFICO DE TAREFAS
// ============================================

function atualizarGraficoTarefas() {
  let tarefasFeitas = 0;
  let tarefasNaoFeitas = 0;
  
  tarefasGlobais.forEach(tarefa => {
    if (tarefa.feita) {
      tarefasFeitas++;
    } else {
      tarefasNaoFeitas++;
    }
  });

  const ctxTarefas = document.getElementById('graficoTarefas').getContext('2d');
  if (graficoTarefasChart) {
    graficoTarefasChart.destroy();
  }
  graficoTarefasChart = new Chart(ctxTarefas, {
    type: 'doughnut',
    data: {
      labels: ['Feitas', 'Faltando'],
      datasets: [{
        data: [tarefasFeitas, tarefasNaoFeitas],
        backgroundColor: ['#4CAF50', '#ddd'],
        borderColor: ['#fff', '#fff'],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 11 } }
        }
      }
    }
  });
}

// ============================================
// CARREGAR TUDO DA PLANILHA
// ============================================

function carregarTudo() {
  const urlItens = SCRIPT_URL + "?acao=getItens";
  const urlPagamentos = SCRIPT_URL + "?acao=getPagamentos";
  
  Promise.all([
    fetch(urlItens).then(r => r.json()),
    fetch(urlPagamentos).then(r => r.json())
  ])
  .then(([dataItens, dataPagamentos]) => {
    
    if (!dataItens.sucesso || !dataItens.itens) {
      return;
    }
    
    itens = [];
    itens = dataItens.itens.map(item => ({
      id: item.id,
      descricao: item.descricao,
      valor: parseFloat(item.valor),
      valorTotal: parseFloat(item.valor),
      valorPago: parseFloat(item.valorPago) || 0
    }));
    
    pagamentosGlobais = [];
    if (dataPagamentos.sucesso && dataPagamentos.pagamentos) {
      pagamentosGlobais = dataPagamentos.pagamentos.map(pag => ({
        id: pag.id,
        itemId: pag.itemId,
        data: pag.data,
        valor: parseFloat(pag.valor),
        descricao: pag.descricao
      }));
    }
    
    render();
    
    let totalPago = 0;
    itens.forEach(item => {
      totalPago += item.valorPago;
    });
    
    if (totalPago !== ultimoTotalPago) {
      ultimoTotalPago = totalPago;
      atualizarGrafico();
    }
  })
  .catch(error => {
    console.error("Erro ao sincronizar:", error);
  });
}

// ============================================
// ENVIAR PARA SHEETS
// ============================================

function enviarParaSheets(dados, tipo = "item") {
  const form = document.createElement("form");
  form.method = "POST";
  form.action = SCRIPT_URL;
  form.target = "uploadFrame";

  const dadosCompletos = {
    tipo: tipo,
    descricao: dados.descricao || "",
    valor: dados.valor || 0,
    itemId: dados.itemId || "",
    data: new Date().toLocaleDateString('pt-BR')
  };

  for(let key in dadosCompletos){
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = dadosCompletos[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();
  form.remove();
}

// ============================================
// ADICIONAR ITEM
// ============================================

function addItem() {
  const descricao = document.getElementById("descricao").value.trim();
  const valor = parseFloat(document.getElementById("valorTotal").value);

  if (!descricao || !valor || valor <= 0) {
    mostrarAlerta('Preencha os campos corretamente', 'erro');
    return;
  }

  const btnAdicionar = document.getElementById("btnAdicionar");
  btnAdicionar.disabled = true;

  const novoItem = {
    descricao: descricao,
    valor: valor
  };

  enviarParaSheets(novoItem, "item");

  mostrarAlerta('✅ Compromisso adicionado!', 'sucesso');
  document.getElementById("descricao").value = "";
  document.getElementById("valorTotal").value = "";

  setTimeout(() => {
    btnAdicionar.disabled = false;
    carregarTudo();
  }, 2000);
}

// ============================================
// ABRIR MODAL
// ============================================

function abrirDetalhes(i) {
  itemSelecionado = i;
  let item = itens[i];

  document.getElementById("modal").style.display = "flex";
  document.getElementById("tituloItem").innerText = item.descricao;

  let historico = document.getElementById("historico");
  historico.innerHTML = "";

  const pagamentosItem = pagamentosGlobais.filter(p => p.itemId === item.id);

  if (pagamentosItem && pagamentosItem.length > 0) {
    pagamentosItem.forEach(p => {
      historico.innerHTML += `<div class="pagoItem">R$ ${p.valor.toFixed(2).replace('.', ',')} — ${p.data}</div>`;
    });
  } else {
    historico.innerHTML = '<p style="color:#999;">Nenhum pagamento registrado</p>';
  }
}

// ============================================
// FECHAR MODAL
// ============================================

function fecharModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("valorPagamento").value = "";
}

// ============================================
// REGISTRAR PAGAMENTO
// ============================================

function registrarPagamento() {
  const valor = parseFloat(document.getElementById("valorPagamento").value);

  if (!valor || valor <= 0) {
    mostrarAlerta('Valor inválido', 'erro');
    return;
  }

  const item = itens[itemSelecionado];
  const btnRegistrar = document.getElementById("btnRegistrar");
  btnRegistrar.disabled = true;

  const pagamento = {
    descricao: item.descricao,
    valor: valor,
    itemId: item.id
  };

  enviarParaSheets(pagamento, "pagamento");

  mostrarAlerta('✅ Pagamento registrado!', 'sucesso');
  
  triggerConfete();
  
  document.getElementById("valorPagamento").value = "";
  fecharModal();

  setTimeout(() => {
    btnRegistrar.disabled = false;
    carregarTudo();
  }, 2500);
}

// ============================================
// REMOVER COM CONFIRMAÇÃO
// ============================================

function remover(i) {
  itemParaDeletar = i;
  document.getElementById("confirmModal").style.display = "flex";
}

function cancelarDelecao() {
  itemParaDeletar = null;
  document.getElementById("confirmModal").style.display = "none";
}

function confirmarDelecao() {
  if (itemParaDeletar === null) return;
  
  const item = itens[itemParaDeletar];
  const btnConfirmar = document.querySelector(".btnConfirmar");
  btnConfirmar.disabled = true;
  btnConfirmar.innerText = "Deletando...";

  deletarDaPlanilha(item.id);
  
  document.getElementById("confirmModal").style.display = "none";
  
  setTimeout(() => {
    carregarTudo();
    btnConfirmar.disabled = false;
    btnConfirmar.innerText = "Deletar";
    mostrarAlerta('✅ Item deletado!', 'sucesso');
  }, 2000);
  
  itemParaDeletar = null;
}

function deletarDaPlanilha(itemId) {
  const form = document.createElement("form");
  form.method = "POST";
  form.action = SCRIPT_URL;
  form.target = "uploadFrame";

  const dados = {
    tipo: "deletarItem",
    itemId: itemId
  };

  for(let key in dados){
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = dados[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();
  form.remove();
}

// ============================================
// MOSTRAR ALERTA
// ============================================

function mostrarAlerta(msg, tipo) {
  const container = document.getElementById("alerta");
  container.className = `alerta ${tipo}`;
  container.innerText = msg;

  setTimeout(() => {
    container.innerHTML = '';
  }, 4000);
}

// ============================================
// ATUALIZAR GRÁFICO
// ============================================

function atualizarGrafico() {
  let totalPlanejado = 0;
  let totalPago = 0;
  
  itens.forEach(item => {
    totalPlanejado += item.valor;
    totalPago += item.valorPago;
  });

  const ctxOrcamento = document.getElementById('graficoOrcamento').getContext('2d');
  if (graficoOrcamentoChart) {
    graficoOrcamentoChart.destroy();
  }
  graficoOrcamentoChart = new Chart(ctxOrcamento, {
    type: 'doughnut',
    data: {
      labels: ['Pago', 'Faltando'],
      datasets: [{
        data: [totalPago, totalPlanejado - totalPago],
        backgroundColor: ['#4CAF50', '#ddd'],
        borderColor: ['#fff', '#fff'],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 11 } }
        }
      }
    }
  });
}

// ============================================
// RENDERIZAR
// ============================================

function render() {
  let lista = document.getElementById("lista");

  if (itens.length === 0) {
    lista.innerHTML = `<div class="empty-state"><div>🎁</div><p>Nenhum compromisso ainda. Adicione o primeiro!</p></div>`;
    document.getElementById("totalPlanejado").innerText = "0";
    document.getElementById("totalPago").innerText = "0";
    document.getElementById("totalFaltando").innerText = "0";
    document.getElementById("barraGeral").style.width = "0%";
    return;
  }

  lista.innerHTML = "";
  let totalPlanejado = 0;
  let totalPago = 0;

  itens.forEach((item, i) => {
    let pago = item.valorPago;
    let progresso = (pago / item.valor) * 100;
    let estaPago = progresso >= 100;

    totalPlanejado += item.valor;
    totalPago += pago;

    lista.innerHTML += `
      <div class="item ${estaPago ? 'pago' : ''}">
        <div class="topItem">
          <div>
            <strong>${item.descricao}</strong><br>
            R$ ${pago.toFixed(2).replace('.', ',')} / R$ ${item.valor.toFixed(2).replace('.', ',')}
          </div>
        </div>
        <div class="progresso">
          <div class="progressoBar" style="width:${progresso}%"></div>
        </div>
        ${estaPago ? '<div class="badge-pago">✓ PAGO</div>' : ''}
        <div class="botoes">
          <button onclick="abrirDetalhes(${i})" ${estaPago ? 'disabled' : ''}>Ver mais</button>
          <button onclick="remover(${i})">Excluir</button>
        </div>
      </div>
    `;
  });

  document.getElementById("totalPlanejado").innerText = totalPlanejado.toFixed(2).replace('.', ',');
  document.getElementById("totalPago").innerText = totalPago.toFixed(2).replace('.', ',');
  document.getElementById("totalFaltando").innerText = (totalPlanejado - totalPago).toFixed(2).replace('.', ',');

  let progressoTotal = (totalPago / totalPlanejado) * 100;
  document.getElementById("barraGeral").style.width = progressoTotal + "%";
}
