<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 Pagamentos do Casamento</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f5f5f5;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.frase{
text-align:center;
color:#666;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
font-weight:bold;
width:100%;
}

.item{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:12px;
}

.topItem{
display:flex;
justify-content:space-between;
}

.progresso{
height:8px;
background:#ddd;
border-radius:5px;
margin-top:8px;
overflow:hidden;
}

.progressoBar{
height:8px;
background:#4CAF50;
}

.botoes{
display:flex;
gap:10px;
margin-top:10px;
}

.botoes button{
flex:1;
font-size:14px;
padding:8px;
}

.total{
text-align:center;
font-size:20px;
font-weight:bold;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:420px;
}

.pagoItem{
background:#e8f7ee;
padding:8px;
border-radius:6px;
margin-top:6px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Nosso Casamento</h1>

<div class="frase">
"Cada pagamento é um passo para o grande dia ❤️"
</div>

<div class="card">

<input id="descricao" placeholder="Ex: Fotógrafo">

<input id="valorTotal" type="number" placeholder="Valor total (R$)">

<button onclick="addItem()">Adicionar compromisso ✨</button>

</div>

<div class="card">

<div class="total">
Total planejado: R$ <span id="totalPlanejado">0</span>
</div>

<div class="total">
Total pago: R$ <span id="totalPago">0</span>
</div>

<div class="progresso">
<div id="barraGeral" class="progressoBar"></div>
</div>

</div>

<div id="lista"></div>

</div>

<div id="modal" class="modal">

<div class="modalContent">

<h3 id="tituloItem"></h3>

<input id="valorPagamento" type="number" placeholder="Valor pago">

<button onclick="registrarPagamento()">Registrar pagamento 🎉</button>

<h4>Histórico</h4>

<div id="historico"></div>

<button onclick="fecharModal()">Fechar</button>

</div>

</div>

<script>

let itens = JSON.parse(localStorage.getItem("casamento")) || []

let itemSelecionado = null

function salvar(){

localStorage.setItem("casamento",JSON.stringify(itens))

}

function addItem(){

let descricao = document.getElementById("descricao").value
let valor = parseFloat(document.getElementById("valorTotal").value)

if(!descricao || !valor){
alert("Preencha os campos")
return
}

itens.push({
descricao,
valorTotal:valor,
pagamentos:[]
})

document.getElementById("descricao").value=""
document.getElementById("valorTotal").value=""

salvar()
render()

}

function totalPagoItem(item){

return item.pagamentos.reduce((s,p)=>s+p.valor,0)

}

function abrirDetalhes(i){

itemSelecionado=i

let item=itens[i]

document.getElementById("modal").style.display="flex"

document.getElementById("tituloItem").innerText=item.descricao

let historico=document.getElementById("historico")

historico.innerHTML=""

item.pagamentos.forEach(p=>{

historico.innerHTML+=`
<div class="pagoItem">
R$ ${p.valor} — ${p.data}
</div>
`

})

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

function registrarPagamento(){

let valor=parseFloat(document.getElementById("valorPagamento").value)

if(!valor) return

let hoje=new Date().toLocaleDateString()

itens[itemSelecionado].pagamentos.push({
valor:valor,
data:hoje
})

document.getElementById("valorPagamento").value=""

salvar()
render()

abrirDetalhes(itemSelecionado)

}

function render(){

let lista=document.getElementById("lista")

lista.innerHTML=""

let totalPlanejado=0
let totalPago=0

itens.forEach((item,i)=>{

let pago=totalPagoItem(item)

let progresso=(pago/item.valorTotal)*100

totalPlanejado+=item.valorTotal
totalPago+=pago

lista.innerHTML+=`

<div class="item">

<div class="topItem">

<div>
<strong>${item.descricao}</strong><br>
R$ ${pago} / R$ ${item.valorTotal}
</div>

</div>

<div class="progresso">
<div class="progressoBar" style="width:${progresso}%"></div>
</div>

<div class="botoes">

<button onclick="abrirDetalhes(${i})">
Ver mais
</button>

<button onclick="remover(${i})">
Excluir
</button>

</div>

</div>

`

})

document.getElementById("totalPlanejado").innerText=totalPlanejado
document.getElementById("totalPago").innerText=totalPago

let progressoTotal=(totalPago/totalPlanejado)*100

document.getElementById("barraGeral").style.width=progressoTotal+"%"

}

function remover(i){

itens.splice(i,1)

salvar()

render()

}

render()

</script>

</body>
</html>
