<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Pagamentos</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.item{
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

.progress{
height:20px;
background:#eee;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:20px;
background:#4caf50;
width:0%;
}

button{
padding:8px 12px;
margin-top:10px;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
width:400px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Itens</h2>

<input id="descricao" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">
<button onclick="addItem()">Adicionar</button>

<h3>Total Geral: R$ <span id="total">0</span></h3>

<div id="lista"></div>

</div>


<div class="modal" id="modal">

<div class="modal-content">

<h3 id="tituloItem"></h3>

<input id="valorPagamento" type="number" placeholder="Valor pagamento">

<button onclick="addPagamento()">Salvar pagamento</button>

<h4>Histórico</h4>

<div id="historico"></div>

<button onclick="fechar()">Fechar</button>

</div>

</div>


<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxt-FJwJzTVkXvpVGL74DqAnfcX0ixsia8D68LKnMP-O0uDn3kEFL8b6ddvIUfEldiz-g/exec";

let itens = JSON.parse(localStorage.getItem("itens")||"[]");
let pagamentos = JSON.parse(localStorage.getItem("pagamentos")||"[]");

let itemAtual = null;

render();

function addItem(){

const descricao=document.getElementById("descricao").value;
const valor=Number(document.getElementById("valor").value);

const id=Date.now().toString();

const data=new Date().toISOString();

const item={
id,
descricao,
valor
};

itens.push(item);

localStorage.setItem("itens",JSON.stringify(itens));

fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams({
tipo:"item",
itemId:id,
descricao,
valor,
data
})
});

render();

}

function addPagamento(){

const valor=Number(document.getElementById("valorPagamento").value);

const data=new Date().toISOString();

const pagamento={
id:Date.now().toString(),
itemId:itemAtual,
valor,
data
};

pagamentos.push(pagamento);

localStorage.setItem("pagamentos",JSON.stringify(pagamentos));

fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams({
tipo:"pagamento",
itemId:itemAtual,
valor,
data
})
});

render();

abrir(itemAtual);

}

function render(){

const lista=document.getElementById("lista");
lista.innerHTML="";

let total=0;

itens.forEach(item=>{

const pagos=pagamentos
.filter(p=>p.itemId==item.id)
.reduce((s,p)=>s+p.valor,0);

total+=item.valor;

const perc=(pagos/item.valor)*100;

const div=document.createElement("div");
div.className="item";

div.innerHTML=`

<h3>${item.descricao}</h3>

<p>Total: R$ ${item.valor}</p>

<p>Pago: R$ ${pagos}</p>

<div class="progress">
<div class="progress-bar" style="width:${perc}%"></div>
</div>

<button onclick="abrir('${item.id}')">Ver Mais</button>

`;

lista.appendChild(div);

});

document.getElementById("total").innerText=total;

}

function abrir(id){

itemAtual=id;

document.getElementById("modal").style.display="flex";

const item=itens.find(i=>i.id==id);

document.getElementById("tituloItem").innerText=item.descricao;

const hist=document.getElementById("historico");

hist.innerHTML="";

pagamentos
.filter(p=>p.itemId==id)
.forEach(p=>{

const d=document.createElement("div");

d.innerText=`${p.data} - R$ ${p.valor}`;

hist.appendChild(d);

});

}

function fechar(){

document.getElementById("modal").style.display="none";

}

</script>

</body>
</html>
