<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 Casamento Financeiro</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f7f7f7;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
font-size:28px;
}

.frase{
text-align:center;
color:#666;
margin-bottom:20px;
font-style:italic;
}

.card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.lista{
margin-top:20px;
}

.item{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.valor{
font-weight:bold;
}

.total{
text-align:center;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.btnDelete{
background:none;
border:none;
color:red;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Gastos do Casamento</h1>

<div class="frase">
"Amor é lindo... mas olha essa fatura 😭"
</div>

<div class="card">

<input id="descricao" placeholder="Ex: Fotógrafo que custa um rim">

<input id="valor" type="number" placeholder="Valor (R$)">

<button onclick="addItem()">Adicionar gasto 😅</button>

</div>

<div class="lista" id="lista"></div>

<div class="total">
Total: R$ <span id="total">0</span>
</div>

</div>

<script>

let itens=[]

function addItem(){

let descricao=document.getElementById("descricao").value
let valor=parseFloat(document.getElementById("valor").value)

if(!descricao || !valor){
alert("Calma noivo, preenche os campos 😂")
return
}

itens.push({descricao,valor})

document.getElementById("descricao").value=""
document.getElementById("valor").value=""

render()

}

function remover(i){

itens.splice(i,1)

render()

}

function render(){

let lista=document.getElementById("lista")
lista.innerHTML=""

let total=0

itens.forEach((item,i)=>{

total+=item.valor

lista.innerHTML+=`

<div class="item">

<div>

<div>${item.descricao}</div>
<div class="valor">R$ ${item.valor}</div>

</div>

<button class="btnDelete" onclick="remover(${i})">❌</button>

</div>

`

})

document.getElementById("total").innerText=total

}

</script>

</body>
</html>
