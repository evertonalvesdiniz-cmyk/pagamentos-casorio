<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 Pagamentos do Casamento</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f5f5f5;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.frase{
text-align:center;
color:#666;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
box-sizing:border-box;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
font-weight:bold;
width:100%;
cursor:pointer;
}

button:hover{
background:#e63d63;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

.item{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:12px;
}

.topItem{
display:flex;
justify-content:space-between;
}

.progresso{
height:8px;
background:#ddd;
border-radius:5px;
margin-top:8px;
overflow:hidden;
}

.progressoBar{
height:8px;
background:#4CAF50;
}

.botoes{
display:flex;
gap:10px;
margin-top:10px;
}

.botoes button{
flex:1;
font-size:14px;
padding:8px;
}

.total{
text-align:center;
font-size:20px;
font-weight:bold;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.modalContent{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:420px;
}

.pagoItem{
background:#e8f7ee;
padding:8px;
border-radius:6px;
margin-top:6px;
font-size:14px;
}

.alerta{
padding:12px;
border-radius:8px;
margin-bottom:15px;
}

.alerta.sucesso{
background:#d4edda;
color:#155724;
border-left:4px solid #28a745;
}

.alerta.erro{
background:#f8d7da;
color:#721c24;
border-left:4px solid #dc3545;
}

.empty-state{
text-align:center;
color:#999;
padding:40px 20px;
}

#uploadFrame{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Nosso Casamento</h1>

<div class="frase">
"Cada pagamento é um passo para o grande dia ❤️"
</div>

<div class="card">

<div id="alerta"></div>

<input id="descricao" placeholder="Ex: Fotógrafo">

<input id="valorTotal" type="number" placeholder="Valor total (R$)">

<button id="btnAdicionar" onclick="addItem()">Adicionar compromisso ✨</button>

</div>

<div class="card">

<div class="total">
Total planejado: R$ <span id="totalPlanejado">0</span>
</div>

<div class="total">
Total pago: R$ <span id="totalPago">0</span>
</div>

<div class="progresso">
<div id="barraGeral" class="progressoBar" style="width:0%"></div>
</div>

</div>

<div id="lista"></div>

</div>

<div id="modal" class="modal">

<div class="modalContent">

<h3 id="tituloItem"></h3>

<input id="valorPagamento" type="number" placeholder="Valor pago">

<button id="btnRegistrar" onclick="registrarPagamento()">Registrar pagamento 🎉</button>

<h4>Histórico</h4>

<div id="historico"></div>

<button onclick="fecharModal()">Fechar</button>

</div>

</div>

<iframe name="uploadFrame" id="uploadFrame"></iframe>

<script>

// ============================================
// CONFIGURAÇÃO
// ============================================

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEGPHFK6yQEA1fArE2Csmu8UiByVVD4s7niol2d7XCVUfqs9XHOAyrJ2gMes857hlijA/exec";

let itens = [];
let itemSelecionado = null;

// ============================================
// INICIALIZAÇÃO
// ============================================

document.addEventListener('DOMContentLoaded', function() {
  carregarItens();
});

// ============================================
// CARREGAR ITENS
// ============================================

function carregarItens() {
  // Recuperar do localStorage
  const itensArmazenados = localStorage.getItem("casamento_itens");
  if (itensArmazenados) {
    itens = JSON.parse(itensArmazenados);
    render();
  }
}

// ============================================
// SALVAR ITENS
// ============================================

function salvarItens() {
  localStorage.setItem("casamento_itens", JSON.stringify(itens));
}

// ============================================
// ENVIAR PARA GOOGLE SHEETS (via formulário)
// ============================================

function enviarParaSheets(item, tipo = "item") {
  const form = document.createElement("form");
  form.method = "POST";
  form.action = SCRIPT_URL;
  form.target = "uploadFrame";

  const dados = {
    tipo: tipo,
    descricao: item.descricao,
    valor: item.valor || item.valorPago,
    itemId: item.id || "",
    data: new Date().toLocaleDateString('pt-BR')
  };

  for(let key in dados){
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = dados[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();
  form.remove();
}

// ============================================
// ADICIONAR ITEM
// ============================================

function addItem() {
  const descricao = document.getElementById("descricao").value.trim();
  const valor = parseFloat(document.getElementById("valorTotal").value);

  if (!descricao || !valor || valor <= 0) {
    mostrarAlerta('Preencha os campos corretamente', 'erro');
    return;
  }

  const btnAdicionar = document.getElementById("btnAdicionar");
  btnAdicionar.disabled = true;

  const novoItem = {
    id: Date.now().toString(),
    descricao: descricao,
    valor: valor,
    valorTotal: valor,
    valorPago: 0,
    pagamentos: []
  };

  itens.push(novoItem);
  salvarItens();

  // Enviar para Google Sheets
  enviarParaSheets(novoItem, "item");

  mostrarAlerta('✅ Compromisso adicionado!', 'sucesso');
  document.getElementById("descricao").value = "";
  document.getElementById("valorTotal").value = "";

  setTimeout(() => {
    btnAdicionar.disabled = false;
    render();
  }, 1500);
}

// ============================================
// TOTAL PAGO DO ITEM
// ============================================

function totalPagoItem(item) {
  return item.pagamentos ? item.pagamentos.reduce((s, p) => s + p.valor, 0) : item.valorPago || 0;
}

// ============================================
// ABRIR MODAL
// ============================================

function abrirDetalhes(i) {
  itemSelecionado = i;
  let item = itens[i];

  document.getElementById("modal").style.display = "flex";
  document.getElementById("tituloItem").innerText = item.descricao;

  let historico = document.getElementById("historico");
  historico.innerHTML = "";

  if (item.pagamentos && item.pagamentos.length > 0) {
    item.pagamentos.forEach(p => {
      historico.innerHTML += `
        <div class="pagoItem">
          R$ ${p.valor.toFixed(2).replace('.', ',')} — ${p.data}
        </div>
      `;
    });
  } else {
    historico.innerHTML = '<p style="color:#999;">Nenhum pagamento registrado</p>';
  }
}

// ============================================
// FECHAR MODAL
// ============================================

function fecharModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("valorPagamento").value = "";
}

// ============================================
// REGISTRAR PAGAMENTO
// ============================================

function registrarPagamento() {
  const valor = parseFloat(document.getElementById("valorPagamento").value);

  if (!valor || valor <= 0) {
    mostrarAlerta('Valor inválido', 'erro');
    return;
  }

  const item = itens[itemSelecionado];
  const btnRegistrar = document.getElementById("btnRegistrar");
  btnRegistrar.disabled = true;

  const hoje = new Date().toLocaleDateString('pt-BR');

  if (!item.pagamentos) {
    item.pagamentos = [];
  }

  item.pagamentos.push({
    valor: valor,
    data: hoje
  });

  item.valorPago = totalPagoItem(item);

  salvarItens();

  // Enviar para Google Sheets
  const pagamento = {
    id: Date.now().toString(),
    descricao: item.descricao,
    valor: valor,
    valorPago: valor,
    itemId: item.id,
    data: hoje
  };
  enviarParaSheets(pagamento, "pagamento");

  mostrarAlerta('✅ Pagamento registrado!', 'sucesso');
  document.getElementById("valorPagamento").value = "";
  fecharModal();

  setTimeout(() => {
    btnRegistrar.disabled = false;
    render();
    abrirDetalhes(itemSelecionado);
  }, 1500);
}

// ============================================
// REMOVER ITEM
// ============================================

function remover(i) {
  if (!confirm('Tem certeza que deseja remover?')) return;
  itens.splice(i, 1);
  salvarItens();
  render();
}

// ============================================
// MOSTRAR ALERTA
// ============================================

function mostrarAlerta(msg, tipo) {
  const container = document.getElementById("alerta");
  container.className = `alerta ${tipo}`;
  container.innerText = msg;

  setTimeout(() => {
    container.innerHTML = '';
  }, 4000);
}

// ============================================
// RENDERIZAR
// ============================================

function render() {
  let lista = document.getElementById("lista");

  if (itens.length === 0) {
    lista.innerHTML = `
      <div class="empty-state">
        <div>🎁</div>
        <p>Nenhum compromisso ainda. Adicione o primeiro!</p>
      </div>
    `;
    document.getElementById("totalPlanejado").innerText = "0";
    document.getElementById("totalPago").innerText = "0";
    document.getElementById("barraGeral").style.width = "0%";
    return;
  }

  lista.innerHTML = "";

  let totalPlanejado = 0;
  let totalPago = 0;

  itens.forEach((item, i) => {
    let pago = totalPagoItem(item);
    let progresso = (pago / item.valor) * 100;

    totalPlanejado += item.valor;
    totalPago += pago;

    lista.innerHTML += `
      <div class="item">
        <div class="topItem">
          <div>
            <strong>${item.descricao}</strong><br>
            R$ ${pago.toFixed(2).replace('.', ',')} / R$ ${item.valor.toFixed(2).replace('.', ',')}
          </div>
        </div>

        <div class="progresso">
          <div class="progressoBar" style="width:${progresso}%"></div>
        </div>

        <div class="botoes">
          <button onclick="abrirDetalhes(${i})">Ver mais</button>
          <button onclick="remover(${i})">Excluir</button>
        </div>
      </div>
    `;
  });

  document.getElementById("totalPlanejado").innerText = totalPlanejado.toFixed(2).replace('.', ',');
  document.getElementById("totalPago").innerText = totalPago.toFixed(2).replace('.', ',');

  let progressoTotal = (totalPago / totalPlanejado) * 100;
  document.getElementById("barraGeral").style.width = progressoTotal + "%";
}

// Fechar modal ao clicar fora
document.addEventListener('click', function(event) {
  const modal = document.getElementById('modal');
  if (event.target === modal) {
    fecharModal();
  }
});

</script>

</body>
</html>
