<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 Pagamentos do Casamento</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f6f6f6;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
font-size:28px;
}

.frase{
text-align:center;
color:#666;
margin-bottom:20px;
font-style:italic;
}

.card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
font-weight:bold;
}

.lista{
margin-top:20px;
}

.item{
background:white;
padding:14px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.pago{
background:#e8f7ee;
}

.valor{
font-weight:bold;
}

.acoes{
display:flex;
gap:10px;
}

.btnPagar{
background:#4CAF50;
padding:6px 10px;
border-radius:6px;
color:white;
font-size:14px;
}

.btnDelete{
background:none;
border:none;
color:red;
font-size:18px;
}

.total{
text-align:center;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Pagamentos do Casamento</h1>

<div class="frase">
"Cada pagamento é um passo mais perto do grande dia ❤️"
</div>

<div class="card">

<input id="descricao" placeholder="Ex: Fotógrafo incrível">

<input id="valor" type="number" placeholder="Valor (R$)">

<button onclick="addItem()">Adicionar compromisso ✨</button>

</div>

<div class="lista" id="lista"></div>

<div class="total">
Total de compromissos: R$ <span id="total">0</span>
</div>

</div>

<script>

let itens=[]

function addItem(){

let descricao=document.getElementById("descricao").value
let valor=parseFloat(document.getElementById("valor").value)

if(!descricao || !valor){
alert("Preencha os campos 😊")
return
}

itens.push({descricao,valor,pago:false})

document.getElementById("descricao").value=""
document.getElementById("valor").value=""

render()

}

function pagar(i){

itens[i].pago=true

render()

}

function remover(i){

itens.splice(i,1)

render()

}

function render(){

let lista=document.getElementById("lista")
lista.innerHTML=""

let total=0

itens.forEach((item,i)=>{

total+=item.valor

lista.innerHTML+=`

<div class="item ${item.pago ? 'pago' : ''}">

<div>

<div>${item.descricao}</div>
<div class="valor">R$ ${item.valor}</div>
${item.pago ? "<div>✔ Pago 🎉</div>" : ""}

</div>

<div class="acoes">

${!item.pago ? `<button class="btnPagar" onclick="pagar(${i})">Pagar 🎉</button>` : ""}

<button class="btnDelete" onclick="remover(${i})">❌</button>

</div>

</div>

`

})

document.getElementById("total").innerText=total

}

</script>

</body>
</html>
