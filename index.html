<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planejamento do Casamento 💍</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#f5f7fa,#e4ecf7);
padding:20px;
margin:0;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#43a047;
}

.progress{
background:#eee;
height:10px;
border-radius:10px;
margin-top:5px;
overflow:hidden;
}

.bar{
height:100%;
background:#4CAF50;
width:0%;
}

.small{
font-size:12px;
color:#666;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Nosso Casamento</h1>
<p style="text-align:center">Pagando tudo com amor (e um pouco de desespero 😂)</p>

<div class="card">

<h3>Novo item</h3>

<input id="descricao" placeholder="Ex: Buffet, Fotógrafo, Vestido">

<input id="valorTotal" type="number" placeholder="Valor total">

<button onclick="addItem()">Adicionar</button>

</div>

<div id="listaItens"></div>

</div>


<div class="modal" id="modal">

<div class="modal-content">

<h3 id="tituloItem"></h3>

<input id="valorPagamento" type="number" placeholder="Valor do pagamento">

<button onclick="adicionarPagamento()">Registrar pagamento</button>

<h4>Histórico</h4>

<div id="historico"></div>

<button onclick="fecharModal()">Fechar</button>

</div>

</div>


<script>

const API_URL = "COLE_AQUI_SEU_SCRIPT";

let itemAtual = null;
let itens = [];
let pagamentos = [];


async function carregar(){

const res = await fetch(API_URL);
const data = await res.json();

itens = data.itens;
pagamentos = data.pagamentos;

render();

}


function render(){

const lista = document.getElementById("listaItens");

lista.innerHTML="";

itens.forEach(item=>{

const pagos = pagamentos
.filter(p=>p.itemId==item.id)
.reduce((s,p)=>s+Number(p.valor),0);

const progresso = Math.min((pagos/item.total)*100,100);

const div = document.createElement("div");

div.className="card";

div.innerHTML=`

<b>${item.descricao}</b>

<div class="small">
Pago: R$ ${pagos} / ${item.total}
</div>

<div class="progress">
<div class="bar" style="width:${progresso}%"></div>
</div>

<br>

<button onclick="verMais('${item.id}')">
Ver mais
</button>

`;

lista.appendChild(div);

});

}



async function addItem(){

const descricao = document.getElementById("descricao").value;
const total = parseFloat(document.getElementById("valorTotal").value);

const dados = {

action:"addItem",
id:Date.now(),
descricao:descricao,
total:total

};

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(dados)
});

document.getElementById("descricao").value="";
document.getElementById("valorTotal").value="";

carregar();

}



function verMais(id){

itemAtual=id;

const item = itens.find(i=>i.id==id);

document.getElementById("tituloItem").innerText=item.descricao;

document.getElementById("modal").style.display="flex";

renderHistorico();

}



function renderHistorico(){

const div = document.getElementById("historico");

const lista = pagamentos.filter(p=>p.itemId==itemAtual);

div.innerHTML="";

lista.forEach(p=>{

const linha=document.createElement("div");

linha.className="small";

linha.innerText = p.data + " - R$ " + p.valor;

div.appendChild(linha);

});

}



async function adicionarPagamento(){

const valor = parseFloat(document.getElementById("valorPagamento").value);

const dados={

action:"addPagamento",
itemId:itemAtual,
valor:valor

};

const API_URL = "https://script.google.com/macros/s/AKfycby_OQ1rFM8UdskaGYvW8nvtys76m28aGryo_pQQH-AeRHG8PWj8AuNcLklaReDcp4bhXw/exec";
method:"POST",
body:JSON.stringify(dados)
});

document.getElementById("valorPagamento").value="";

carregar();

renderHistorico();

}



function fecharModal(){

document.getElementById("modal").style.display="none";

}



carregar();

</script>

</body>
</html>
